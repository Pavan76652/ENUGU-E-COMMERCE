name: Keep backend warm

# Render's free tier puts the API to sleep after ~15 min of inactivity, which
# makes the next visitor wait 30-50s for a cold start. This pings the health
# endpoint on a schedule so the server stays awake during the day.
on:
  schedule:
    # Every 10 minutes (UTC). GitHub may delay scheduled runs under load.
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: |
          URL="${{ vars.RENDER_HEALTH_URL }}"
          if [ -z "$URL" ]; then
            URL="https://enugu-api.onrender.com/api/v1/health"
          fi
          echo "Pinging $URL"
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$URL" || echo "000")
            echo "Attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Backend is awake."
              exit 0
            fi
            sleep 20
          done
          echo "Backend did not return 200 after retries (it may still be waking)."
